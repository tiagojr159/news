<!DOCTYPE html><html lang="pt-BR"><head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  <title>Terra Girando</title>  <style>    body {      margin: 0;      padding: 0;      display: flex;      justify-content: center;      align-items: center;      min-height: 100vh;      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);      font-family: Arial, sans-serif;      overflow: hidden;    }    .container {      text-align: center;      position: relative;    }    canvas {      border-radius: 50%;      box-shadow: 0 0 50px rgba(100, 149, 237, 0.3),                  0 0 100px rgba(100, 149, 237, 0.2),                  inset 0 0 30px rgba(0, 0, 0, 0.3);      animation: float 6s ease-in-out infinite;      cursor: grab;      user-select: none;    }    canvas:active {      cursor: grabbing;    }    @keyframes float {      0%, 100% { transform: translateY(0px) scale(1); }      50% { transform: translateY(-10px) scale(1.02); }    }    .stars {      position: absolute;      top: 0; left: 0;      width: 100%; height: 100%;      pointer-events: none;      z-index: -1;    }    .star {      position: absolute;      background: white;      border-radius: 50%;      animation: twinkle 3s infinite alternate;    }    @keyframes twinkle {      0% { opacity: 0.3; }      100% { opacity: 1; }    }    .info {      color: white;      margin-top: 30px;      font-size: 14px;      opacity: 0.8;    }  </style></head><body>  <div class="stars" id="stars"></div>  <div class="container">    <canvas id="earthCanvas" width="300" height="300"></canvas>    <div class="info">      ?? Planeta Terra • Rotaçăo: 24 horas<br>      <small>??? Arraste para girar • ?? Toque e arraste no celular</small>    </div>  </div>  <script>    const canvas = document.getElementById('earthCanvas');    const ctx = canvas.getContext('2d');    const centerX = canvas.width / 2;    const centerY = canvas.height / 2;    const radius = 150;    let rotation = 0;    let earthImage = null;    let imageLoaded = false;    let isDragging = false;    let lastMouseX = 0;    let autoRotate = true;    let rotationSpeed = 0.005;    function loadEarthImage() {      earthImage = new Image();      earthImage.crossOrigin = 'anonymous';      earthImage.onload = function() {        imageLoaded = true;      };      earthImage.src = 'https://i0.wp.com/narceliodesa.com/wp-content/uploads/2019/10/11.jpg?fit=750%2C410&ssl=1';    }    function drawEarth() {      ctx.clearRect(0, 0, canvas.width, canvas.height);      if (imageLoaded && earthImage) {        ctx.save();        ctx.beginPath();        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);        ctx.clip();        const imageWidth = radius * 2.5;        const imageHeight = radius * 2.5;        ctx.save();        ctx.translate(centerX, centerY);        const offsetX = (rotation * 100) % imageWidth;        ctx.drawImage(earthImage, -offsetX - imageWidth / 2, -imageHeight / 2, imageWidth, imageHeight);        ctx.drawImage(earthImage, -offsetX + imageWidth / 2, -imageHeight / 2, imageWidth, imageHeight);        ctx.restore();        ctx.restore();      } else {        ctx.fillStyle = '#1e3a8a';        ctx.beginPath();        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);        ctx.fill();        ctx.fillStyle = 'white';        ctx.font = '16px Arial';        ctx.textAlign = 'center';        ctx.fillText('Carregando...', centerX, centerY);      }      const gradient = ctx.createRadialGradient(centerX, centerY, radius * 0.8, centerX, centerY, radius * 1.2);      gradient.addColorStop(0, 'rgba(100, 149, 237, 0)');      gradient.addColorStop(1, 'rgba(100, 149, 237, 0.4)');      ctx.fillStyle = gradient;      ctx.beginPath();      ctx.arc(centerX, centerY, radius * 1.2, 0, Math.PI * 2);      ctx.fill();      const shadowGradient = ctx.createRadialGradient(centerX - 30, centerY - 30, 0, centerX, centerY, radius);      shadowGradient.addColorStop(0, 'rgba(255, 255, 255, 0.2)');      shadowGradient.addColorStop(0.7, 'rgba(255, 255, 255, 0)');      shadowGradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');      ctx.save();      ctx.beginPath();      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);      ctx.clip();      ctx.fillStyle = shadowGradient;      ctx.fillRect(0, 0, canvas.width, canvas.height);      ctx.restore();      drawRotatingLabel();    }    function drawRotatingLabel() {      ctx.save();      ctx.translate(centerX, centerY);      const labelRadius = radius + 40;      const labelAngle = rotation * 2 + Math.PI / 2;      // ROTAÇĂO ELÍPTICA      const labelX = Math.cos(labelAngle) * labelRadius;      const labelY = Math.sin(labelAngle) * labelRadius * 0.5;      ctx.font = 'bold 16px Arial';      ctx.textAlign = 'center';      ctx.textBaseline = 'middle';      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';      ctx.fillText('Tiago Junior', labelX + 2, labelY + 2);      const textGradient = ctx.createLinearGradient(labelX - 50, labelY - 10, labelX + 50, labelY + 10);      textGradient.addColorStop(0, '#FFD700');      textGradient.addColorStop(0.5, '#FFA500');      textGradient.addColorStop(1, '#FF6347');      ctx.fillStyle = textGradient;      ctx.fillText('Tiago Junior', labelX, labelY);      ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';      ctx.lineWidth = 1;      ctx.strokeText('Tiago Junior', labelX, labelY);      drawStar(labelX + 60, labelY - 5, 6, 2, rotation * 3);      ctx.restore();    }    function drawStar(x, y, outerRadius, innerRadius, rotation) {      ctx.save();      ctx.translate(x, y);      ctx.rotate(rotation);      ctx.beginPath();      for (let i = 0; i < 10; i++) {        const angle = (i * Math.PI) / 5;        const radius = i % 2 === 0 ? outerRadius : innerRadius;        const px = Math.cos(angle) * radius;        const py = Math.sin(angle) * radius;        if (i === 0) ctx.moveTo(px, py);        else ctx.lineTo(px, py);      }      ctx.closePath();      const starGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, outerRadius);      starGradient.addColorStop(0, '#FFFF00');      starGradient.addColorStop(1, '#FFA500');      ctx.fillStyle = starGradient;      ctx.fill();      ctx.strokeStyle = '#FFD700';      ctx.lineWidth = 1;      ctx.stroke();      ctx.restore();    }    function animate() {      if (autoRotate && !isDragging) {        rotation += rotationSpeed;      }      drawEarth();      requestAnimationFrame(animate);    }    canvas.addEventListener('mousedown', (e) => {      isDragging = true;      autoRotate = false;      lastMouseX = e.clientX;      canvas.style.cursor = 'grabbing';    });    canvas.addEventListener('mousemove', (e) => {      if (isDragging) {        const deltaX = e.clientX - lastMouseX;        rotation += deltaX * 0.01;        lastMouseX = e.clientX;      }    });    canvas.addEventListener('mouseup', () => {      isDragging = false;      canvas.style.cursor = 'grab';      setTimeout(() => {        if (!isDragging) autoRotate = true;      }, 2000);    });    canvas.addEventListener('mouseleave', () => {      isDragging = false;      canvas.style.cursor = 'grab';      setTimeout(() => {        if (!isDragging) autoRotate = true;      }, 1000);    });    canvas.addEventListener('mouseenter', () => {      canvas.style.cursor = 'grab';    });    canvas.addEventListener('touchstart', (e) => {      e.preventDefault();      isDragging = true;      autoRotate = false;      lastMouseX = e.touches[0].clientX;    });    canvas.addEventListener('touchmove', (e) => {      e.preventDefault();      if (isDragging) {        const deltaX = e.touches[0].clientX - lastMouseX;        rotation += deltaX * 0.01;        lastMouseX = e.touches[0].clientX;      }    });    canvas.addEventListener('touchend', (e) => {      e.preventDefault();      isDragging = false;      setTimeout(() => {        if (!isDragging) autoRotate = true;      }, 2000);    });    function createStars() {      const starsContainer = document.getElementById('stars');      for (let i = 0; i < 100; i++) {        const star = document.createElement('div');        star.className = 'star';        star.style.left = Math.random() * 100 + '%';        star.style.top = Math.random() * 100 + '%';        star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';        star.style.animationDelay = Math.random() * 3 + 's';        starsContainer.appendChild(star);      }    }    createStars();    loadEarthImage();    animate();  </script></body></html>
